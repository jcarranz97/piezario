name: Tests

# Runs the automated test suites on every pull request (and on pushes to main).
# Two independent jobs: the Next.js app's TypeScript logic (Vitest + tsc + a
# production build) and the thumbnail generator's Python logic (pytest).
on:
  pull_request:
  push:
    branches: [main]

jobs:
  web:
    name: Web (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Unit tests
        run: npm run test
      - name: Production build
        run: npm run build

  python:
    name: Thumbnails (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: web/scripts/requirements-dev.txt
      - name: Install dependencies
        run: pip install -r web/scripts/requirements-dev.txt
      - name: Unit tests
        working-directory: web/scripts
        run: python -m pytest tests/ -q
